  <body>
    <div id="root"></div>
    <script>
      // CORREÇÃO: Interceptar URLs de outros projetos ANTES de qualquer coisa
      // LIMPAR DADOS ANTIGOS DO PROJETO DELETADO
      (function() {
        try {
          // Limpar localStorage de projetos antigos
          const keysToRemove = [];
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && (
              key.includes('zunuqaidxffuhwmvcwul') ||
              key.includes('qbtqjrcfseqcfmcqlngr') ||
              key.includes('gbtqjrcfseqcfmcqlngr') ||
              (key.includes('supabase.auth.token') && !key.includes('jibpvpqgplmahjhswiza'))
            )) {
              keysToRemove.push(key);
            }
          }
          keysToRemove.forEach(key => {
            console.log('🗑️ [HTML-CLEANUP] Removendo chave antiga:', key);
            localStorage.removeItem(key);
          });
        } catch (e) {
          console.warn('⚠️ [HTML-CLEANUP] Erro ao limpar storage:', e);
        }
      })();
      
      (function() {
        const CORRECT_SUPABASE_URL = 'https://jibpvpqgplmahjhswiza.supabase.co';
        const OLD_URLS = ['qbtqjrcfseqcfmcqlngr', 'gbtqjrcfseqcfmcqlngr', 'zunuqaidxffuhwmvcwul'];
        
        function shouldCorrect(url) {
          if (!url) return false;
          const urlStr = typeof url === 'string' ? url : url.toString();
          return OLD_URLS.some(old => urlStr.includes(old));
        }
        
        function correctUrl(url) {
          const urlStr = typeof url === 'string' ? url : url.toString();
          return urlStr.replace(/https?:\/\/([^/]+)\.supabase\.co/g, CORRECT_SUPABASE_URL);
        }
        
        // INTERCEPTAR FETCH - VERSÃO MAIS AGRESSIVA
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
          try {
            let url = typeof input === 'string' ? input : input instanceof URL ? input.toString() : (input && input.url ? input.url : '');
            
            if (shouldCorrect(url)) {
              const correctedUrl = correctUrl(url);
              console.warn('🔧 [HTML-FETCH] CORRIGINDO URL:', url.substring(0, 100), '→', correctedUrl.substring(0, 100));
              
              if (typeof input === 'string') {
                input = correctedUrl;
              } else if (input instanceof URL) {
                input = new URL(correctedUrl);
              } else if (input && input.url) {
                input = new Request(correctedUrl, input);
              } else {
                input = correctedUrl;
              }
            }
          } catch (e) {
            console.error('❌ Erro no interceptor fetch:', e);
          }
          
          return originalFetch.call(this, input, init);
        };
        
        // INTERCEPTAR XMLHttpRequest - VERSÃO MAIS AGRESSIVA
        const OriginalXHR = window.XMLHttpRequest;
        window.XMLHttpRequest = function() {
          const xhr = new OriginalXHR();
          const originalOpen = xhr.open;
          const originalSend = xhr.send;
          
          xhr.open = function(method, url, ...args) {
            const urlStr = typeof url === 'string' ? url : url.toString();
            if (shouldCorrect(urlStr)) {
              const correctedUrl = correctUrl(urlStr);
              console.warn('🔧 [HTML-XHR] CORRIGINDO URL:', urlStr.substring(0, 100), '→', correctedUrl.substring(0, 100));
              return originalOpen.call(this, method, correctedUrl, ...args);
            }
            return originalOpen.call(this, method, url, ...args);
          };
          
          return xhr;
        };
        
        // INTERCEPTAR SUPABASE CLIENT DIRETAMENTE (se já existir)
        if (window.supabase && window.supabase.supabaseUrl) {
          const oldUrl = window.supabase.supabaseUrl;
          if (shouldCorrect(oldUrl)) {
            console.warn('🔧 [HTML] Corrigindo supabase.supabaseUrl:', oldUrl, '→', CORRECT_SUPABASE_URL);
            try {
              window.supabase.supabaseUrl = CORRECT_SUPABASE_URL;
            } catch (e) {
              console.error('❌ Não foi possível corrigir supabase.supabaseUrl:', e);
            }
          }
        }
        
        console.log('✅ [HTML] Interceptores AGRESSIVOS instalados - URLs antigas serão corrigidas automaticamente');
      })();
    </script>
